name: Etched mention monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # backup trigger (GitHub may delay); cron-job.org is the reliable one
  workflow_dispatch: {}        # manual / external (cron-job.org) trigger

concurrency:
  group: etched-monitor        # never let two runs overlap
  cancel-in-progress: false

permissions:
  contents: write              # so the run can commit updated state.json
  actions: write               # so the run can re-dispatch the LinkedIn workflow when it lags

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          TWAPI_KEY: ${{ secrets.TWAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_REVIEW_WEBHOOK_URL: ${{ secrets.SLACK_REVIEW_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL: ${{ secrets.SLACK_REVIEW_CHANNEL }}
        run: python monitor.py

      # GitHub delays hourly cron by hours; this job runs reliably every 15 min
      # (cron-job.org), so it doubles as the LinkedIn workflow's watchdog.
      - name: Keep LinkedIn monitor on schedule
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, datetime
          repo, tok = os.environ["REPO"], os.environ["GH_TOKEN"]
          def api(path, method="GET", payload=None):
              req = urllib.request.Request(f"https://api.github.com/repos/{repo}{path}", method=method,
                  data=json.dumps(payload).encode() if payload else None,
                  headers={"Authorization": f"Bearer {tok}", "Accept": "application/vnd.github+json"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  body = r.read().decode()
                  return json.loads(body) if body else {}
          runs = api("/actions/workflows/linkedin.yml/runs?per_page=1").get("workflow_runs") or []
          age = 1e9
          if runs:
              t = datetime.datetime.strptime(runs[0]["run_started_at"], "%Y-%m-%dT%H:%M:%SZ") \
                      .replace(tzinfo=datetime.timezone.utc)
              age = (datetime.datetime.now(datetime.timezone.utc) - t).total_seconds()
          if age > 55 * 60:
              api("/actions/workflows/linkedin.yml/dispatches", "POST", {"ref": "main"})
              print(f"linkedin last ran {age/60:.0f} min ago -> dispatched")
          else:
              print(f"linkedin fresh ({age/60:.0f} min ago), nothing to do")
          EOF

      - name: Commit updated state
        run: |
          git config user.name  "etched-mention-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet && { echo "no state change"; exit 0; }
          git commit -m "state: $(date -u +%FT%TZ)"
          # push is race-safe: on rejection, rebase onto the latest and retry
          for i in 1 2 3 4 5; do
            if git push; then echo "pushed"; exit 0; fi
            echo "push rejected; rebasing (attempt $i)"
            git pull --rebase --autostash -X theirs origin main || git rebase --abort
            sleep 3
          done
          echo "state push failed after 5 attempts"; exit 1
